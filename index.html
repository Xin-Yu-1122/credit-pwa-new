<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="信用卡記帳">
<meta name="theme-color" content="#534AB7">
<title>信用卡記帳</title>
<!-- 主題切換：在最早期套用，避免閃爍 -->
<script>
  (function(){
    var t = localStorage.getItem('theme') || 'dark';
    if (t === 'light') document.documentElement.classList.add('light');
  })();
</script>
<!-- ⚠️ 必須在所有其他 script 之前捕捉 beforeinstallprompt，否則手機版會錯過事件 -->
<script>
  window._pwaPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._pwaPrompt = e;
    console.log('[PWA] beforeinstallprompt captured ✓');
    // 如果 app 已載入就直接顯示 banner，否則等 app 準備好
    if (window._pwaReady) {
      window._showPwaBanner();
    }
  });
  window.addEventListener('appinstalled', function() {
    console.log('[PWA] App installed ✓');
    window._pwaPrompt = null;
    var b = document.getElementById('pwa-banner');
    if (b) b.classList.add('hidden');
  });
</script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F1418;--bg2:#1A2026;--bg3:#262E36;--bg4:#323A44;
  --fg:#E8E9EC;--fg2:#A8AEB6;--fg3:#6B7480;
  --primary:#534AB7;--primary2:#6B5FE0;
  --green:#4CAF50;--red:#E57373;--orange:#FF9900;--yellow:#FFD54F;--blue:#5B9BD5;
  --r:10px;--r2:14px;
  --shadow:0 4px 16px rgba(0,0,0,.3);
}
:root.light{
  --bg:#F5F6FA;--bg2:#FFFFFF;--bg3:#EDEFF3;--bg4:#DCE0E8;
  --fg:#1A1F2E;--fg2:#4A5466;--fg3:#8089A0;
  --shadow:0 4px 16px rgba(0,0,0,.06);
}
:root.light .expense-row{background:#FAFBFD}
:root.light input,:root.light select,:root.light textarea{background:#FAFBFD!important;color:var(--fg)!important}
:root.light .modal{box-shadow:0 -8px 32px rgba(0,0,0,.1)}
:root.light .topbar{box-shadow:0 1px 0 var(--bg3)}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;font-size:14px;padding-bottom:env(safe-area-inset-bottom)}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}

/* Login screen */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:linear-gradient(135deg,#534AB7 0%,#3C3489 100%)}
.login-icon{width:96px;height:96px;border-radius:24px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:54px;margin-bottom:24px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.login-screen h1{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.login-screen p{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:36px;line-height:1.7}
.btn-google{background:#fff;color:#333;padding:12px 28px;border-radius:24px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:transform .1s}
.btn-google:hover{transform:scale(1.03)}
.btn-google:active{transform:scale(.97)}
.login-error{color:#FFAB91;font-size:13px;margin-top:14px;line-height:1.6;max-width:320px}

/* App shell */
.app-shell{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
@media (min-width:768px){.app-shell{max-width:1100px}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--bg3);position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar-actions{display:flex;gap:6px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--fg)}
.icon-btn:hover{background:var(--bg4)}
.month-sel-deprecated{display:none}

/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bg3);overflow-x:auto}
.tab-btn{flex:1;padding:12px 8px;font-size:13px;color:var(--fg2);font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;min-width:max-content;background:transparent}
.tab-btn.active{color:var(--primary2);border-bottom-color:var(--primary2);font-weight:600}

.content{padding:14px}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%);background-size:200% 100%;animation:sk 1.5s ease-in-out infinite;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.sk-kpi{height:74px;border-radius:var(--r2)}
.sk-bank{height:200px;border-radius:var(--r2);margin-bottom:12px}
.loading-elapsed{text-align:center;padding:10px;color:var(--fg3);font-size:12px;font-variant-numeric:tabular-nums}
.loading-stale-banner{text-align:center;padding:6px 12px;background:var(--bg3);color:var(--fg3);font-size:11px;border-radius:6px;margin-bottom:10px}
@media (min-width:768px){.sk-kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media (min-width:1100px){.sk-kpi-grid{grid-template-columns:repeat(6,1fr)}}

/* Cards */
.card{background:var(--bg2);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;border:1px solid var(--bg3)}
.card-title{font-size:11px;color:var(--fg3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:24px;font-weight:700;color:var(--fg)}
.card-sub{font-size:12px;color:var(--fg2);margin-top:4px}

/* Dashboard summary - 6 KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
@media (min-width:768px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media (min-width:1100px){.kpi-grid{grid-template-columns:repeat(6,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:10px 12px}
.kpi-label{font-size:10px;color:var(--fg3);font-weight:500;letter-spacing:.04em;margin-bottom:4px}
.kpi-value{font-size:17px;font-weight:700;color:var(--fg)}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.orange{color:var(--orange)}
.kpi-value.blue{color:var(--blue)}

/* Bank/card list - 直排格式 */
.bank-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media (min-width:768px){.bank-grid{grid-template-columns:1fr 1fr}}
@media (min-width:1100px){.bank-grid{grid-template-columns:repeat(3,1fr)}}

.card-row{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:14px 16px;position:relative}
.card-row.paid{border-left:4px solid var(--green)}
.card-row.paid .paid-badge{display:inline-flex}
.paid-badge{display:none;position:absolute;top:10px;right:12px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;align-items:center;gap:3px}

.bank-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.bank-name{font-size:15px;font-weight:700;color:var(--primary2)}
.bank-info{font-size:10px;color:var(--fg3)}

.bank-line{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:12px;color:var(--fg2)}
.bank-line .v{font-size:13px;font-weight:600;color:var(--fg)}
.bank-line.divider{border-top:1px solid var(--bg3);margin:6px 0;padding:0;height:0}
.bank-line.highlight{padding:6px 0 2px}
.bank-line.highlight .v{font-size:18px;font-weight:700}
.bank-line.sub{font-size:11px;color:var(--fg3);padding:0 0 4px;margin-top:-2px}
.bank-line.sub .v{font-size:11px;font-weight:500;color:var(--fg3)}

.v.green{color:var(--green)!important}
.v.red{color:var(--red)!important}
.v.orange{color:var(--orange)!important}
.v.blue{color:var(--blue)!important}
.v.teal{color:#0F6E56!important}

/* 已繳款卡片內文字稍微淡化 */
.card-row.paid .bank-name{color:var(--fg2)}
.card-row.paid .bank-line{color:var(--fg3)}
.card-row.paid .bank-line .v:not(.green){color:var(--fg3)}

/* 舊格式保留給其他地方用 */
.card-row-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-row-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-row-tag{font-size:10px;color:var(--fg3);background:var(--bg3);padding:2px 6px;border-radius:8px;font-weight:500}
.card-row-amt{font-size:16px;font-weight:700}
.card-row-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--fg2);margin-top:6px}
.card-row-meta span b{color:var(--fg);font-weight:600}
.card-row-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn-mini{padding:5px 10px;font-size:11px;border-radius:14px;background:var(--bg3);color:var(--fg2);font-weight:500}
.btn-mini:hover{background:var(--bg4)}
.btn-mini.active{background:var(--primary);color:#fff}
.chk-paid{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--fg2);cursor:pointer;user-select:none;margin-top:8px}
.chk-paid input{accent-color:var(--primary)}

/* Section header with refresh button */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.section-head-title{font-size:13px;font-weight:600;color:var(--fg2)}
.refresh-mini{padding:5px 10px;font-size:12px;border-radius:14px;background:var(--bg3);color:var(--fg2);display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.refresh-mini:hover{background:var(--bg4);color:var(--fg)}
.refresh-mini.spinning{pointer-events:none;opacity:.6}
.refresh-mini.spinning .ricon{animation:spin 1s linear infinite;display:inline-block}

/* Expense list */
.expense-list{margin-top:8px}
.expense-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;margin-bottom:6px;font-size:13px}
.expense-row.installment{border-left:3px solid var(--orange)}
.expense-row.color-1{border-left:3px solid #E57373}
.expense-row.color-2{border-left:3px solid #FF9900}
.expense-row.color-3{border-left:3px solid #FFD54F}
.expense-row.color-4{border-left:3px solid #81C784}
.expense-row.color-5{border-left:3px solid #64B5F6}
.expense-row.color-6{border-left:3px solid #BA68C8}
.expense-row.color-7{border-left:3px solid #F48FB1}
.expense-row.color-8{border-left:3px solid #B0BEC5}
.exp-date{font-size:11px;color:var(--fg3);min-width:36px;font-weight:500}
.exp-info{flex:1;min-width:0;overflow:hidden}
.exp-note{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-cat{font-size:10px;color:var(--fg3);margin-top:2px}
.exp-amt{font-weight:700;font-size:14px;white-space:nowrap}
.exp-amt.neg{color:var(--green)}

/* Form */
.form-section{padding:14px;background:var(--bg2);border-radius:var(--r2);margin-bottom:12px;border:1px solid var(--bg3)}
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;color:var(--fg3);font-weight:600;letter-spacing:.04em;margin-bottom:5px;text-transform:uppercase}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--bg3);background:var(--bg);color:var(--fg);font-size:14px}
.inp:focus{outline:none;border-color:var(--primary2)}
textarea.inp{resize:vertical;min-height:60px}

/* Color picker */
.color-grid{display:flex;flex-wrap:wrap;gap:6px}
.color-opt{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-opt:hover{transform:scale(1.1)}
.color-opt.selected{border-color:var(--primary2);transform:scale(1.1);box-shadow:0 0 0 2px rgba(107,95,224,.3)}

/* Buttons */
.btn{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-ghost{background:var(--bg3);color:var(--fg)}
.btn-ghost:hover{background:var(--bg4)}
.btn-danger{background:#3a1818;color:var(--red);border:1px solid #4a1f1f}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:14px}

/* FAB */
.fab{position:fixed;right:calc(50% - 240px + 18px);bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(83,74,183,.5);z-index:50}
@media (max-width:560px){.fab{right:18px}}
.fab:active{transform:scale(.95)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.center{align-items:center;padding:20px}
.modal{background:var(--bg2);border-top-left-radius:18px;border-top-right-radius:18px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:18px;border:1px solid var(--bg3)}
.modal-overlay.center .modal{border-radius:18px;max-height:80vh}
.modal-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:14px}
.modal h3{font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:8px}

/* Notify */
.notify{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--fg);padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;box-shadow:var(--shadow);border:1px solid var(--bg4);max-width:90%;text-align:center}
.notify.err{background:#3a1818;border-color:#4a1f1f;color:var(--red)}
.notify.ok{background:#1a3a25;border-color:#1f4a30;color:var(--green)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--fg3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* Charts */
.chart-wrap{padding:14px;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r2);margin-bottom:12px}
.chart-title{font-size:13px;font-weight:600;color:var(--fg2);margin-bottom:12px}
.donut-wrap{position:relative;width:200px;height:200px;margin:0 auto 12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px;color:var(--fg2)}
.legend-dot{width:10px;height:10px;border-radius:50%}

table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:6px 4px;border-bottom:1px solid var(--bg3)}
th{font-weight:600;color:var(--fg3);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
td.r,th.r{text-align:right}

/* Loading */
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--bg3);border-top-color:var(--primary2);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.dim{color:var(--fg3)}
.bold{font-weight:700}

/* ─── 消費分析重構 ─── */
.sub-tab-bar{display:flex;margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid var(--bg3)}
.sub-tab-btn{flex:1;padding:9px 8px;font-size:13px;font-weight:500;color:var(--fg2);background:var(--bg3);border:none;cursor:pointer;transition:background .15s,color .15s}
.sub-tab-btn.active{background:var(--primary);color:#fff}

.analysis-total-val{font-size:24px;font-weight:700;color:var(--primary2);text-align:center;margin-bottom:2px}
.analysis-total-lbl{font-size:12px;color:var(--fg3);text-align:center;margin-bottom:12px}

.ess-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ess-card{border-radius:10px;padding:10px 12px;text-align:center}
.ess-card.e{background:rgba(83,74,183,.18)}.ess-card.n{background:rgba(216,90,48,.12)}
.ec-label{font-size:10px;margin-bottom:3px;font-weight:500}
.ec-val{font-size:16px;font-weight:700}
.ec-pct{font-size:11px;margin-top:2px;opacity:.8}
.ess-card.e .ec-label,.ess-card.e .ec-val,.ess-card.e .ec-pct{color:#AFA9EC}
.ess-card.n .ec-label,.ess-card.n .ec-val,.ess-card.n .ec-pct{color:#FAC775}
:root.light .ess-card.e{background:#EEEDFE}
:root.light .ess-card.n{background:#FAECE7}
:root.light .ess-card.e .ec-label,:root.light .ess-card.e .ec-val,:root.light .ess-card.e .ec-pct{color:#534AB7}
:root.light .ess-card.n .ec-label,:root.light .ess-card.n .ec-val,:root.light .ess-card.n .ec-pct{color:#D85A30}

.cat-section{margin-bottom:14px}
.cat-section-title{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:8px;display:inline-block;letter-spacing:.03em}
.cat-section-title.e{background:rgba(83,74,183,.2);color:#AFA9EC}
.cat-section-title.n{background:rgba(216,90,48,.15);color:#FAC775}
:root.light .cat-section-title.e{background:#EEEDFE;color:#3C3489}
:root.light .cat-section-title.n{background:#FAECE7;color:#993C1D}

.cat-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0}
.pct-bar-wrap{background:var(--bg3);border-radius:3px;height:4px;min-width:40px}
.pct-bar{height:4px;border-radius:3px}
.cat-subtotal td{background:var(--bg3)!important;font-weight:600}
.cat-table th{text-transform:none}

.trend-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.tl-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--fg2)}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* 消費分析在寬螢幕分欄 */
@media (min-width:900px){
  .analysis-pie-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start}
}

/* ─── Custom Select（年月份/銀行/卡別下拉）─── */
.cs-wrap{position:relative;display:inline-block}
.cs-trigger{padding:7px 30px 7px 14px;border-radius:20px;background:var(--bg3);color:var(--fg);font-size:13px;font-weight:600;border:1px solid var(--bg4);cursor:pointer;display:inline-flex;align-items:center;gap:8px;min-width:90px;position:relative;transition:background .15s}
.cs-trigger:hover{background:var(--bg4)}
.cs-trigger::after{content:'';position:absolute;right:12px;top:50%;width:6px;height:6px;border-right:2px solid var(--fg2);border-bottom:2px solid var(--fg2);transform:translateY(-70%) rotate(45deg);transition:transform .15s}
.cs-wrap.open .cs-trigger::after{transform:translateY(-30%) rotate(-135deg)}
.cs-panel{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;box-shadow:var(--shadow);padding:4px;min-width:130px;max-height:280px;overflow-y:auto;z-index:50;display:none;animation:cs-fade .15s ease}
.cs-wrap.open .cs-panel{display:block}
@keyframes cs-fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.cs-opt{padding:8px 12px;font-size:13px;color:var(--fg);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;white-space:nowrap}
.cs-opt:hover{background:var(--bg3)}
.cs-opt.selected{background:var(--primary);color:#fff;font-weight:600}
.cs-opt.selected:hover{background:var(--primary2)}

/* 表單裡的 custom select 用 inp 樣式 */
.cs-form .cs-trigger{display:flex;width:100%;justify-content:flex-start;padding:10px 32px 10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--bg3);font-size:14px;font-weight:400;min-width:0}
.cs-form .cs-panel{left:0;right:0;width:100%}
.cs-form .cs-opt{padding:10px 12px;font-size:14px}

/* PWA Install Banner */
.pwa-banner{position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:300;box-shadow:0 -4px 20px rgba(83,74,183,.5);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pwa-banner-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.pwa-banner-text{flex:1;min-width:0}
.pwa-banner-title{font-size:14px;font-weight:700}
.pwa-banner-sub{font-size:12px;opacity:.85;margin-top:2px}
.pwa-banner-btn{background:#fff;color:var(--primary);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;flex-shrink:0}
.pwa-banner-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer}

/* iOS install guide */
.ios-guide{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--primary);padding:16px;z-index:300;box-shadow:0 -4px 20px rgba(0,0,0,.4);animation:slideUp .3s ease}
.ios-guide h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ios-steps{display:flex;flex-direction:column;gap:8px}
.ios-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--fg2)}
.ios-step-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ios-guide-close{position:absolute;top:12px;right:16px;font-size:20px;color:var(--fg3);cursor:pointer}

/* Loading screen */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#534AB7,#3C3489);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
#splash img{width:88px;height:88px;border-radius:20px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
#splash h1{color:#fff;font-size:20px;font-weight:600}
#splash p{color:rgba(255,255,255,.6);font-size:13px;margin-top:6px}
#splash.hidden{display:none}

/* Setup screen for first time */
.setup-card{padding:18px;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r2);margin-bottom:12px}
.setup-info{font-size:12px;line-height:1.7;color:var(--fg2);background:var(--bg3);padding:10px 12px;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img src="icon-192.png" alt="">
  <h1>信用卡記帳</h1>
  <p id="splash-msg">載入中…</p>
  <button class="btn-mini hidden" id="splash-retry" style="margin-top:16px;background:rgba(255,255,255,.2);color:#fff;padding:8px 16px" onclick="location.reload()">重新載入</button>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="hidden">
  <div class="login-screen">
    <div class="login-icon">💳</div>
    <h1>信用卡記帳</h1>
    <p>多帳戶管理・自動寫入 Google 試算表<br>一鍵記錄消費與分期</p>
    <button class="btn-google" id="login-btn" onclick="signIn()">
      <span style="font-size:18px">🔑</span>
      使用 Google 帳號登入
    </button>
    <div class="login-error hidden" id="login-error"></div>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="hidden">
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-title">⚙ 初始設定</div>
    </div>
    <div class="content">
      <div class="setup-card">
        <h2 style="font-size:16px;margin-bottom:8px">連結 Google 試算表</h2>
        <div class="field">
          <label>試算表 ID 或網址</label>
          <input class="inp" id="setup-sheet-id" placeholder="貼上試算表網址或 ID"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="saveSetup()">儲存並開始</button>
        <div class="setup-info">
          試算表網址範例：<br>
          <code style="font-size:11px;word-break:break-all;color:var(--fg3)">docs.google.com/spreadsheets/d/【ID】/edit</code>
        </div>
      </div>
      <div style="text-align:center;margin-top:14px">
        <button class="btn-mini" onclick="signOut()">登出</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-title">💳 信用卡記帳</div>
      <div class="topbar-actions">
        <div class="cs-wrap" id="cs-month-wrap">
          <button class="cs-trigger" id="cs-month-trigger" onclick="csToggle('cs-month-wrap')"><span id="cs-month-label">—</span></button>
          <div class="cs-panel" id="cs-month-panel"></div>
        </div>
        <button class="icon-btn" onclick="openMenu()" title="選單">☰</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">🏠 儀表板</button>
      <button class="tab-btn active" data-tab="add" onclick="switchTab('add')">✏️ 記帳</button>
      <button class="tab-btn" data-tab="analysis" onclick="switchTab('analysis')">📊 消費分析</button>
    </div>

    <div class="content" id="tab-content"></div>

  </div>
</div>

<!-- SHEET NOT EXIST MODAL -->
<div class="modal-overlay hidden" id="sheet-ne-modal" onclick="if(event.target===this)closeSheetNE()">
  <div class="modal" style="max-width:380px">
    <div class="modal-handle"></div>
    <h2 style="margin-bottom:8px">⚠️ 分頁不存在</h2>
    <p style="color:var(--fg2);line-height:1.7;margin-bottom:20px;font-size:14px">
      試算表中找不到 <b id="sne-month-label" style="color:var(--fg1)"></b> 月份分頁。<br>
      請先到試算表手動建立後再記帳。
    </p>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheetNE()">取消</button>
      <button class="btn btn-primary" onclick="closeSheetNE();openSheet()">前往試算表</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT FORM MODAL -->
<div class="modal-overlay hidden" id="form-modal" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="form-title">新增記帳</h2>
    <div class="form-section">
      <div class="field">
        <label>月份分頁</label>
        <select class="inp" id="f-month"></select>
      </div>
      <div class="field">
        <label>記帳項目（銀行）</label>
        <select class="inp" id="f-bankgroup" onchange="onBankGroupChange()">
          <option value="">— 請選擇 —</option>
        </select>
      </div>
      <div class="field hidden" id="f-card-field">
        <label>卡別</label>
        <select class="inp" id="f-card"></select>
      </div>
      <div class="field">
        <label>日期</label>
        <input class="inp" id="f-date" type="date"/>
      </div>
      <div class="field">
        <label>金額（負數=刷退）</label>
        <input class="inp" id="f-amt" type="number" step="1" placeholder="例：350 或 -100" inputmode="numeric"/>
      </div>
      <div class="field">
        <label>備註 / 帳務資訊</label>
        <textarea class="inp" id="f-note" placeholder="例：全家便利商店、午餐"></textarea>
      </div>
      <div class="field">
        <label>分類</label>
        <select class="inp" id="f-cat"></select>
      </div>
      <div class="field">
        <label>底色</label>
        <div class="color-grid" id="f-colors"></div>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="f-installment" onchange="onInstallmentChange()" style="accent-color:var(--orange)"/>
          <span>分期付款（自動加 [分期] + 橘色底）</span>
        </label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeForm()">取消</button>
      <button class="btn btn-danger hidden" id="f-delete" onclick="deleteEntry()">刪除</button>
      <button class="btn btn-primary" style="flex:1" id="f-save" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<!-- MENU MODAL -->
<div class="modal-overlay hidden" id="menu-modal" onclick="if(event.target===this)closeMenu()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>選單</h2>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary btn-full" id="menu-install-btn" onclick="closeMenu();handleInstallClick()" style="display:none">📲 安裝為 App（加入主畫面）</button>
      <button class="btn btn-ghost btn-full" id="menu-theme-btn" onclick="toggleTheme()">🌙 切換深色 / 淺色</button>
      <button class="btn btn-ghost btn-full" onclick="closeMenu();openSheet()">📊 開啟 Google 試算表</button>
      <button class="btn btn-ghost btn-full" onclick="closeMenu();reloadAll()">🔄 重新載入資料</button>
      <button class="btn btn-ghost btn-full" onclick="closeMenu();openSetupAgain()">⚙ 變更試算表</button>
      <button class="btn btn-ghost btn-full" onclick="closeMenu();showAbout()">ℹ 關於</button>
      <button class="btn btn-danger btn-full" onclick="signOut()">登出</button>
    </div>
  </div>
</div>

<!-- NOTIFY -->
<div class="notify hidden" id="notify"></div>

<!-- PWA Install Banner (Android Chrome) -->
<div class="pwa-banner hidden" id="pwa-banner">
  <div class="pwa-banner-icon">💳</div>
  <div class="pwa-banner-text">
    <div class="pwa-banner-title">安裝為 App</div>
    <div class="pwa-banner-sub">加入主畫面，快速開啟記帳</div>
  </div>
  <button class="pwa-banner-btn" onclick="triggerInstall()">安裝</button>
  <div class="pwa-banner-close" onclick="dismissBanner()">✕</div>
</div>

<!-- iOS Install Guide -->
<div class="ios-guide hidden" id="ios-guide">
  <div class="ios-guide-close" onclick="dismissIosGuide()">✕</div>
  <h3>📲 加入主畫面</h3>
  <div class="ios-steps">
    <div class="ios-step">
      <div class="ios-step-num">1</div>
      <span>點下方工具列的 <b style="color:#6B5FE0">分享</b> 按鈕（方塊+箭頭）</span>
    </div>
    <div class="ios-step">
      <div class="ios-step-num">2</div>
      <span>選單中找 <b style="color:#6B5FE0">「加入主畫面」</b></span>
    </div>
    <div class="ios-step">
      <div class="ios-step-num">3</div>
      <span>點右上角 <b style="color:#6B5FE0">「新增」</b> 完成</span>
    </div>
  </div>
</div>

<!-- Manual Install Guide Modal (Android & 其他) -->
<div class="modal-overlay hidden center" id="install-guide-modal" onclick="if(event.target===this)closeInstallGuide()">
  <div class="modal">
    <h2>📲 安裝為 App</h2>
    <div id="install-guide-content"></div>
    <div class="btn-row">
      <button class="btn btn-primary btn-full" onclick="closeInstallGuide()">我知道了</button>
    </div>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- Google APIs (僅需 gapi for Sheets) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="app.js?v=2.0"></script>
</body>
</html>
